databases:
  - name: laravel-equipment-db
    databaseName: equipment_management
    user: equipment_user
    plan: free

services:
  - type: web
    name: laravel-equipment-app
    runtime: docker
    plan: free
    buildCommand: "./scripts/build-render.sh"
    startCommand: "/usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_PORT
        value: 5432
      - key: DATABASE_URL
        fromDatabase:
          name: laravel-equipment-db
          property: connectionString
      - key: APP_KEY
        generateValue: true
      - key: APP_KEY_HASH
        value: qxazNrUeIBDJ4S
      - key: BCRYPT_ROUNDS
        value: 10
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: 120
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_DRIVER
        value: file
      - key: FILESYSTEM_DISK
        value: local
    healthCheckPath: /
services:
  - type: web
    name: edukho-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: APP_NAME
        value: "Quan ly Thiet bi Day hoc"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_TIMEZONE
        value: Asia/Ho_Chi_Minh
      - key: APP_LOCALE
        value: vi
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: edukho-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: edukho-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: edukho-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: edukho-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: edukho-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stderr
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_TIMEOUT
        value: "15"

databases:
  - name: edukho-db
    plan: free
    databaseName: equipment_management
    region: singapore
